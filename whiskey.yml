
Build:
- Version:
    Path: GitAutomation\GitAutomation.psd1
    Prerelease:
    - "*": rc$(WHISKEY_BUILD_NUMBER)
    - main: ""
    IncrementPrereleaseVersion: true

- Exec: appveyor UpdateBuild -Version "$(WHISKEY_SEMVER2)+$(WHISKEY_BUILD_NUMBER)"
  .OnlyBy: BuildServer

- DotNet:
    .WorkingDirectory: Source
    Command: build
    Argument:
    - --configuration=$(WHISKEY_MSBUILD_CONFIGURATION)
    - -p:Version=$(WHISKEY_SEMVER2)
    - --framework=net46
    - --output=..\..\GitAutomation\bin

- DotNet:
    .WorkingDirectory: Source
    Command: publish
    Argument:
    - --configuration=$(WHISKEY_MSBUILD_CONFIGURATION)
    - -p:Version=$(WHISKEY_SEMVER2)
    - --framework=netstandard2.0
    - --output=..\..\GitAutomation\bin

# These are all files we don't want in our package.
- Delete:
    Path:
    - GitAutomation\bin\*.json
    - GitAutomation\bin\*.pdb
    - GitAutomation\bin\*.config
    - GitAutomation\bin\*.xml
    # Way too big.
    - GitAutomation\bin\*\*\*\*.pdb
    # LibGit2Sharp doesn't support shipping all the native binaries together and loading the correct ones at runtime so
    # get rid of them.
    - GitAutomation\bin\runtimes
    - GitAutomation\bin\lib\*64
    - GitAutomation\bin\lib\osx

- PowerShell: prism install | Format-Table

- MergeFile:
    .OnlyBy: BuildServer
    Path: GitAutomation\Functions\*
    DestinationPath: GitAutomation\GitAutomation.psm1
    DeleteSourceFiles: true
    TextSeparator: "$(NewLine)$(NewLine)"

- CopyFile:
    Path:
    - RELEASE_NOTES.md
    - LICENSE
    - NOTICE
    - README.md
    DestinationDirectory: GitAutomation

# Create package for GitHub
- Zip:
    ArchivePath: .output\GitAutomation-$(WHISKEY_SEMVER2_NO_BUILD_METADATA).zip
    Path:
    - GitAutomation
- Exec: appveyor 'PushArtifact' '.output/GitAutomation-$(WHISKEY_SEMVER2).zip' '-DeploymentName' 'GitHub'
  .OnlyBy: BuildServer

# Create package for PowerShell Gallery
- PublishPowerShellModule:
    Path: GitAutomation
- Exec: appveyor 'PushArtifact' '.output/GitAutomation.$(WHISKEY_SEMVER2_NO_BUILD_METADATA).nupkg' -DeploymentName 'PowerShellGallery'
  .OnlyBy: BuildServer

- Exec: git config --global user.name AppVeyor
  .OnlyBy: BuildServer
- Exec: git config --global user.email appveyor@example.com
  .OnlyBy: BuildServer
- Pester4:
    Script: Tests\*.Tests.ps1
